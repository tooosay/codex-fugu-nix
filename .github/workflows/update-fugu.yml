name: update fugu-src and codex pin

on:
  schedule:
    - cron: "0 1,9,17 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: DeterminateSystems/nix-installer-action@main

      - name: bump fugu-src
        run: nix flake update fugu-src

      - name: update matching Codex version and hashes
        run: ./scripts/update-codex-pin.sh

      # Runs in the same job, so it works with the default GITHUB_TOKEN
      # (PRs created by GITHUB_TOKEN do not trigger their own CI runs).
      - name: verify flake
        run: nix flake check

      - name: build package
        run: nix build .#codex-fugu

      - name: open PR if anything changed
        id: cpr
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: "flake: bump fugu-src and codex pin"
          title: "flake: bump fugu-src and codex pin"
          branch: auto/bump-fugu-src
          body: |
            Automated bump of the `fugu-src` flake input.

            This also updates `pkgs/codex-fugu/codex-pin.nix` from upstream
            `BUNDLE_CODEX_VERSION` and prefetches the matching Codex release
            hashes for supported Linux targets.
          labels: |
            dependencies
            fugu-src
            codex

      - name: summarize no update
        if: steps.cpr.outputs.pull-request-operation == 'none'
        run: |
          {
            echo "### ✅ fugu-src / Codex pin update"
            echo
            echo "更新対象はありませんでした。"
            echo
            echo "新しく merge するものはありません。"
          } >> "$GITHUB_STEP_SUMMARY"
